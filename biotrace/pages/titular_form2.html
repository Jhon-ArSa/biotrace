<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titular – Fotos y QR</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="mint-bg">
  <div class="screen">
    <div class="field-group">
      <label class="field-label">Código único de la Longitud</label>
      <input id="longitud" type="text" placeholder="Escribe aquí" class="input-field-dark">
    </div>
    <div class="field-group">
      <label class="field-label">Volumen</label>
      <input id="volumen" type="text" placeholder="Escribe aquí" class="input-field-dark">
    </div>

    <div class="field-group">
      <label class="field-label">Fotografía del corte transversal</label>
      <label class="photo-upload" for="foto1">
        <span class="camera-icon" id="icon1">📷</span>
        <img id="prev1" class="photo-preview" style="display:none">
        <input id="foto1" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this,'prev1','icon1')">
      </label>
    </div>

    <div class="field-group">
      <label class="field-label">Fotografía de la troza completa</label>
      <label class="photo-upload" for="foto2">
        <span class="camera-icon" id="icon2">📷</span>
        <img id="prev2" class="photo-preview" style="display:none">
        <input id="foto2" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this,'prev2','icon2')">
      </label>
    </div>

    <div class="field-group">
      <label class="field-label">FECHA</label>
      <input id="fecha" type="date" class="input-field-dark">
    </div>

    <div id="errMsg" class="alert" style="display:none"></div>
    <button onclick="generarQR()" class="btn btn-outline-dark">Generar código QR ›</button>
    <a href="titular_form.html" class="back-link">← Atrás</a>
  </div>
  <script>
    if (!sessionStorage.getItem('btl_troza')) location.href = 'titular_form.html';

    function previewImg(input, prevId, iconId) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById(prevId).src = e.target.result;
        document.getElementById(prevId).style.display = 'block';
        document.getElementById(iconId).style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    async function generarQR() {
      const err = document.getElementById('errMsg');
      const longitud = document.getElementById('longitud').value.trim();
      const volumen  = document.getElementById('volumen').value.trim();
      const fecha    = document.getElementById('fecha').value;
      const foto1 = document.getElementById('foto1').files[0];
      const foto2 = document.getElementById('foto2').files[0];
      
      if (!longitud || !volumen || !fecha) {
        err.textContent = 'Completa longitud, volumen y fecha.';
        err.style.display = 'block'; return;
      }
      if (!foto1 || !foto2) {
        err.textContent = 'Debes subir ambas fotografías.';
        err.style.display = 'block'; return;
      }
      
      err.style.display = 'none';
      
      const troza = JSON.parse(sessionStorage.getItem('btl_troza'));
      const titular_id = sessionStorage.getItem('btl_user_id') || 1;
      
      const formData = new FormData();
      formData.append('titular_id', titular_id);
      formData.append('numero_parcela', troza.parcela);
      formData.append('especie', troza.especie);
      formData.append('nombre_cientifico', troza.especie);
      formData.append('dap_cm', troza.dap);
      formData.append('longitud_troza', longitud);
      formData.append('volumen_m3', volumen);
      
      const [lat, lon] = troza.gps.split(',').map(s => s.trim());
      formData.append('latitud', lat || '0');
      formData.append('longitud', lon || '0');
      formData.append('plan_manejo', 'PM-2026-001');
      formData.append('observaciones', `Registrado desde BioTrace - ${fecha}`);
      formData.append('foto_corte', foto1);
      formData.append('foto_troza', foto2);
      
      const btn = event.target;
      btn.textContent = '⏳ Registrando...';
      btn.disabled = true;
      
      try {
        const response = await fetch('http://localhost:5000/api/traz/censo', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();
        
        if (result.success && result.trozo) {
          sessionStorage.setItem('btl_trozo_registrado', JSON.stringify(result.trozo));
          location.href = 'titular_qr.html';
        } else {
          err.textContent = result.error || 'Error al registrar trozo';
          err.style.display = 'block';
          btn.textContent = 'Generar código QR ›';
          btn.disabled = false;
        }
      } catch (error) {
        err.textContent = 'Error de conexión con el servidor';
        err.style.display = 'block';
        btn.textContent = 'Generar código QR ›';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
