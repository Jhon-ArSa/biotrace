<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparación de trozas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="mint-bg">
  <div class="screen" id="formView">
    <div class="field-group">
      <label class="field-label">Fotografía del corte transversal</label>
      <label class="photo-upload" for="foto1">
        <span class="camera-icon" id="icon1">📷</span>
        <img id="prev1" class="photo-preview" style="display:none">
        <input id="foto1" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this,'prev1','icon1')">
      </label>
    </div>
    <div class="field-group">
      <label class="field-label">Fotografía de la troza completa</label>
      <label class="photo-upload" for="foto2">
        <span class="camera-icon" id="icon2">📷</span>
        <img id="prev2" class="photo-preview" style="display:none">
        <input id="foto2" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this,'prev2','icon2')">
      </label>
    </div>
    <div class="field-group">
      <label class="field-label">FECHA</label>
      <input id="fecha" type="date" class="input-field-dark">
    </div>
    <div id="errMsg" class="alert" style="display:none"></div>
    <button onclick="comparar()" class="btn btn-outline-dark">Realizar comparación ›</button>
    <a href="centro_dashboard.html" class="back-link">← Volver</a>
  </div>

  <!-- Loading screen -->
  <div class="screen center-screen" id="loadingView" style="display:none">
    <div class="dark-teal-header-full">
      <h3 class="module-title">Módulo de comparación de las trozas</h3>
    </div>
    <div style="font-size:130px; margin:32px 0">🪵</div>
    <p class="searching-text">Buscando similitud....</p>
    <div class="spinner"></div>
  </div>

  <!-- Result screen -->
  <div class="screen center-screen" id="resultView" style="display:none">
    <div class="dark-teal-header-full">
      <h3 class="module-title">Módulo de comparación de las trozas</h3>
    </div>
    <div class="result-label-box">Troza de eucalipto</div>
    <div class="result-images">
      <div class="result-img-box teal-bg" style="font-size:90px">🌲</div>
      <div class="result-img-box cream-bg" style="font-size:90px">🌳</div>
    </div>
    <a href="centro_dashboard.html" class="btn btn-dark" style="margin-top:20px">REGRESAR AL INICIO</a>
  </div>

  <script>
    if (sessionStorage.getItem('btl_role') !== 'centro') location.href = '../pages/login.html?role=centro';

    function previewImg(input, prevId, iconId) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById(prevId).src = e.target.result;
        document.getElementById(prevId).style.display = 'block';
        document.getElementById(iconId).style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function comparar() {
      const fecha = document.getElementById('fecha').value;
      const err   = document.getElementById('errMsg');
      if (!fecha) { err.textContent = 'Por favor ingresa la fecha.'; err.style.display = 'block'; return; }
      err.style.display = 'none';
      document.getElementById('formView').style.display    = 'none';
      document.getElementById('loadingView').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('resultView').style.display  = 'flex';
      }, 2500);
    }
  </script>
</body>
</html>
