<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código QR – Bio Trace Labs</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Responsive QR Page */
    @media (max-width: 640px) {
      .qr-title {
        font-size: 20px !important;
        margin-bottom: 20px !important;
      }
      
      .qr-container {
        padding: 16px;
      }
      
      .qr-image {
        width: 160px !important;
        height: 160px !important;
      }
      
      .troza-summary {
        padding: 12px 14px;
        font-size: 12px;
      }
      
      .btn {
        font-size: 14px;
        padding: 14px;
      }
    }
    
    @media (max-width: 380px) {
      .qr-title {
        font-size: 18px !important;
      }
      
      .qr-image {
        width: 140px !important;
        height: 140px !important;
      }
      
      .troza-summary {
        font-size: 11px;
      }
    }
  </style>
</head>
<body class="cream-bg">
  <div class="screen center-screen">
    <h2 class="qr-title">Código QR generado<br>de la troza</h2>
    <div class="qr-container">
      <img id="qrImg" class="qr-image" alt="Código QR">
    </div>
    <div class="troza-summary" id="resumen"></div>
    <button onclick="descargar()" class="btn btn-dark">⬇ Descargar QR</button>
    <a href="../index.html" class="btn btn-outline-teal" style="margin-top:10px">Regresar al inicio</a>
  </div>
  <script>
    const raw = sessionStorage.getItem('btl_trozo_registrado');
    if (!raw) { location.href = 'titular_form.html'; }
    const trozo = JSON.parse(raw);
    
    const qrData = encodeURIComponent(trozo.codigo_unico_trozo || JSON.stringify(trozo));
    document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${qrData}`;

    const campos = { 
      codigo_unico_trozo: 'Código Único',
      especie: 'Especie',
      numero_parcela: 'Parcela',
      dap_cm: 'DAP (cm)',
      longitud_troza: 'Longitud',
      volumen_m3: 'Volumen (m³)',
      fecha_hora: 'Fecha de Registro'
    };
    let html = '';
    for (const [k, label] of Object.entries(campos)) {
      if (trozo[k]) {
        let valor = trozo[k];
        if (k === 'fecha_hora') valor = valor.substring(0, 16).replace('T', ' ');
        html += `<p><strong>${label}:</strong> ${valor}</p>`;
      }
    }
    document.getElementById('resumen').innerHTML = html;

    function descargar() {
      const a = document.createElement('a');
      a.href = document.getElementById('qrImg').src;
      a.download = `troza_${trozo.codigo_unico_trozo || 'qr'}.png`;
      a.click();
    }
    
    sessionStorage.removeItem('btl_troza');
    sessionStorage.removeItem('btl_trozo_registrado');
  </script>
</body>
</html>
