<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1BC05A">
    <title>Bio Trace Labs – Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Login page mejorado con logo */
        .logo-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo-brand img {
            width: 120px;
            height: auto;
            margin: 0 auto 12px auto;
            border: none;
            outline: none;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }
        
        .logo-brand-title {
            font-size: 20px;
            font-weight: 800;
            color: #1E3A3A;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .logo-brand-subtitle {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Responsive Login Page */
        @media (max-width: 640px) {
            .logo-brand img {
                width: 100px;
            }
            
            .logo-brand-title {
                font-size: 18px;
            }
            
            .logo-brand-subtitle {
                font-size: 10px;
            }
            
            .logo-row {
                gap: 10px;
                margin-bottom: 20px;
            }
            
            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            
            .logo-text {
                font-size: 18px;
            }
            
            .welcome-title {
                font-size: 24px;
                margin-bottom: 20px;
            }
            
            .login-form {
                gap: 12px;
                margin-bottom: 12px;
            }
            
            .input-field {
                font-size: 15px;
                padding: 14px 16px;
            }
            
            .btn {
                font-size: 15px;
                padding: 16px;
            }
            
            .demo-box {
                padding: 14px 16px;
                margin-top: 20px;
            }
            
            .demo-title {
                font-size: 13px;
                margin-bottom: 10px;
            }
            
            .demo-row {
                gap: 6px;
                margin-bottom: 6px;
            }
            
            .demo-label {
                font-size: 11px;
                min-width: 60px;
            }
            
            .demo-value {
                font-size: 12px;
            }
            
            .demo-copy {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .demo-fill {
                font-size: 12px;
                padding: 8px;
            }
        }
        
        @media (max-width: 380px) {
            .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
            
            .logo-text {
                font-size: 16px;
            }
            
            .welcome-title {
                font-size: 20px;
            }
            
            .input-field {
                font-size: 14px;
                padding: 12px 14px;
            }
            
            .btn {
                font-size: 14px;
                padding: 14px;
            }
            
            .demo-box {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body class="green-bg">
    <div class="screen">
        <div class="logo-brand">
            <img src="../logo/logo_app_sinfondo1.png" alt="BioTrace Labs">
            <div class="logo-brand-title"></div>
            <div class="logo-brand-subtitle">Trazabilidad Forestal</div>
        </div>
        <h2 class="welcome-title">Iniciar Sesión</h2>
        <div id="alertBox" class="alert" style="display:none"></div>
        <div class="login-form">
            <input type="text" id="roleDisplay" class="input-field" readonly>
            <input type="email" id="email" placeholder="Correo" class="input-field" autocomplete="email">
            <input type="password" id="password" placeholder="Contraseña" class="input-field">
            <button onclick="doLogin()" class="btn btn-light">Iniciar sesión</button>
        </div>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        <a href="../index.html" class="back-link">← Volver</a>

        <!-- Credenciales de prueba -->
        <div class="demo-box" id="demoBox"></div>
    </div>
    <script>
        const API_BASE = window.location.origin;
        const params = new URLSearchParams(location.search);
        const role = params.get('role') || 'titular';
        
        const labels = {
            titular: 'Titular',
            chofer: 'Chofer',
            centro: 'Centro de transformación'
        };
        document.getElementById('roleDisplay').value = labels[role] || 'Titular';

        // Credenciales de prueba REALES del backend
        const usuarios = {
            titular: {
                email: 'titular@biotrace.com',
                password: 'titular2026'
            },
            chofer: {
                email: 'chofer@biotrace.com',
                password: 'chofer2026'
            },
            centro: {
                email: 'centro@biotrace.com',
                password: 'centro2026'
            }
        };

        // Mostrar caja de credenciales
        const creds = usuarios[role];
        document.getElementById('demoBox').innerHTML = `
            <p class="demo-title">🔑 Credenciales de prueba</p>
            <div class="demo-row">
                <span class="demo-label">Correo</span>
                <span class="demo-value">${creds.email}</span>
                <button class="demo-copy" onclick="copiar('email','${creds.email}',this)">Copiar</button>
            </div>
            <div class="demo-row">
                <span class="demo-label">Contraseña</span>
                <span class="demo-value">${creds.password}</span>
                <button class="demo-copy" onclick="copiar('password','${creds.password}',this)">Copiar</button>
            </div>
            <button class="demo-fill" onclick="rellenar()">✨ Rellenar automático</button>
        `;

        function copiar(campo, valor, btn) {
            navigator.clipboard.writeText(valor).catch(() => {});
            document.getElementById(campo).value = valor;
            btn.textContent = '✓';
            setTimeout(() => btn.textContent = 'Copiar', 1500);
        }

        function rellenar() {
            document.getElementById('email').value = creds.email;
            document.getElementById('password').value = creds.password;
        }

        const destinos = {
            titular: '../pages/titular_form.html',
            chofer: '../pages/chofer_dashboard.html',
            centro: '../pages/centro_dashboard.html'
        };

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('alertBox');

            if (!email || !pass) {
                alertBox.textContent = 'Por favor ingresa tu correo y contraseña.';
                alertBox.style.display = 'block';
                return;
            }

            alertBox.textContent = 'Verificando credenciales...';
            alertBox.style.display = 'block';
            alertBox.style.background = '#fff3cd';
            alertBox.style.color = '#856404';

            try {
                // Llamar a la API REAL del backend
                const response = await fetch(`${API_BASE}/api/traz/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password: pass })
                });

                const result = await response.json();

                if (result.success && result.usuario) {
                    // Login exitoso - guardar datos del usuario
                    sessionStorage.setItem('btl_role', result.usuario.rol);
                    sessionStorage.setItem('btl_email', result.usuario.email);
                    sessionStorage.setItem('btl_user_id', result.usuario.id);
                    sessionStorage.setItem('btl_centro_id', result.usuario.id); // Para compatibilidad
                    sessionStorage.setItem('btl_user_name', result.usuario.nombre);
                    
                    alertBox.textContent = '✓ Login exitoso. Redirigiendo...';
                    alertBox.style.background = '#d4edda';
                    alertBox.style.color = '#155724';
                    
                    // Redirigir según el rol REAL del backend
                    setTimeout(() => {
                        if (result.usuario.rol === 'titular') {
                            location.href = '../pages/titular_dashboard.html';
                        } else if (result.usuario.rol === 'conductor' || result.usuario.rol === 'chofer') {
                            location.href = '../pages/chofer_dashboard.html';
                        } else if (result.usuario.rol === 'centro_transformacion' || result.usuario.rol === 'centro') {
                            location.href = '../pages/centro_dashboard.html';
                        } else {
                            location.href = destinos[role] || '../index.html';
                        }
                    }, 800);
                } else {
                    alertBox.textContent = '❌ ' + (result.error || 'Credenciales incorrectas');
                    alertBox.style.display = 'block';
                    alertBox.style.background = '#f8d7da';
                    alertBox.style.color = '#721c24';
                }
            } catch (error) {
                console.error('Error de login:', error);
                alertBox.textContent = '❌ Error de conexión. Verifica que el servidor esté corriendo en http://localhost:5000';
                alertBox.style.display = 'block';
                alertBox.style.background = '#f8d7da';
                alertBox.style.color = '#721c24';
            }
        }

        // Permitir login con Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
